<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dziennik kierowcy</title>
    <meta name="theme-color" content="#007bff">
    <link rel="manifest" href="manifest.webmanifest">
    <style>
        body { font-family: Arial, sans-serif; margin: 15px; background: #f5f5f5; }
        h1 { text-align: center; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        .form-box { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        .btn-secondary { background: #6c757d; }
        .btn-danger { background: #dc3545; }
        .btn-pdf { background: #0d6efd; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #007bff; color: white; }
        .actions button { margin: 2px; padding: 5px 8px; font-size: 14px; }
        footer { text-align: center; margin-top: 20px; color: #666; }
    </style>
    <!-- Biblioteka do PDF -->
    <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="container">
    <h1>🚛 Dziennik kierowcy</h1>

    <div class="form-box">
        <div class="row">
            <div><label>Kierowca</label><input type="text" id="driver" placeholder="Jan Kowalski" oninput="saveHeader()"></div>
            <div><label>Nr auta</label><input type="text" id="carNo" placeholder="SK 1234A" oninput="saveHeader()"></div>
        </div>
        <div class="row">
            <div><label>Rodzaj</label>
                <select id="type"><option value="Załadunek">Załadunek</option><option value="Rozładunek">Rozładunek</option></select>
            </div>
            <div><label>Data</label><input type="date" id="date"></div>
        </div>
        <label>Miejsce</label><input type="text" id="place" placeholder="Katowice, DHL">
        <label>Stan licznika (km)</label><input type="number" id="odometer" placeholder="152340">

        <div class="row">
            <button onclick="addEntry()">➕ Dodaj wpis</button>
            <button class="btn-secondary" onclick="exportCSV()">💾 CSV</button>
        </div>
        <div class="row">
            <button class="btn-pdf" onclick="exportPDF()">📄 Eksportuj PDF</button>
            <button onclick="window.print()">🖨️ Drukuj stronę</button>
        </div>
        <button class="btn-danger" onclick="clearLog()" style="width:100%; margin-top:10px;">🗑️ Wyczyść wszystko</button>
    </div>

    <div class="form-box">
        <table id="logTable">
            <thead><tr><th>#</th><th>Data</th><th>Rodzaj</th><th>Miejsce</th><th>Licznik</th><th>Akcje</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<footer>© Dziennik kierowcy • Ulepszone przez Grok</footer>

<script>
// ==================== DANE I FUNKCJE PODSTAWOWE ====================
let entries = [];

const todayStr = () => new Date().toISOString().slice(0,10);

function load() {
    const raw = localStorage.getItem('driverLog_v2') || localStorage.getItem('driverLog');
    if (!raw) return [];
    try {
        return JSON.parse(raw).map((e,i) => ({
            id: e.id ?? i+1,
            date: e.date,
            type: e.type,
            place: e.place,
            odometer: String(e.odometer),
            ts: e.ts ?? Date.now()
        })).sort((a,b) => b.ts - a.ts);
    } catch(e) { return []; }
}

function persist() { localStorage.setItem('driverLog_v2', JSON.stringify(entries)); }

function render() {
    const tbody = document.querySelector('#logTable tbody');
    tbody.innerHTML = '';
    entries.forEach((e, i) => {
        const row = tbody.insertRow();
        row.innerHTML = `
            <td>${i+1}</td>
            <td>${e.date}</td>
            <td>${e.type}</td>
            <td>${e.place}</td>
            <td>${e.odometer}</td>
            <td class="actions">
                <button onclick="editEntry(${e.id})">✏️</button>
                <button onclick="deleteEntry(${e.id})">🗑️</button>
            </td>
        `;
    });
}

// ==================== PDF – NAPRAWIONA WERSJA ====================
async function exportPDF() {
    if (entries.length === 0) {
        alert("Brak wpisów do wygenerowania PDF!");
        return;
    }

    const driver = document.getElementById('driver').value || localStorage.getItem('driverName') || 'Kierowca';
    const carNo = document.getElementById('carNo').value || localStorage.getItem('carNumber') || '';

    // Tworzymy ładną tabelę do PDF
    let html = `
        <div style="font-family: Arial, sans-serif; padding: 20px;">
            <h1 style="text-align:center;">Dziennik Kierowcy</h1>
            <p><strong>Kierowca:</strong> ${driver} &nbsp;&nbsp; <strong>Auto:</strong> ${carNo}</p>
            <table border="1" cellpadding="8" cellspacing="0" style="width:100%; border-collapse: collapse; margin-top:15px;">
                <thead>
                    <tr style="background:#007bff; color:white;">
                        <th>#</th><th>Data</th><th>Rodzaj</th><th>Miejsce</th><th>Stan licznika (km)</th>
                    </tr>
                </thead>
                <tbody>`;

    entries.forEach((e, i) => {
        html += `<tr>
            <td>${i+1}</td>
            <td>${e.date}</td>
            <td>${e.type}</td>
            <td style="text-align:left;">${e.place}</td>
            <td>${e.odometer}</td>
        </tr>`;
    });

    html += `</tbody></table></div>`;

    const element = document.createElement('div');
    element.innerHTML = html;

    const opt = {
        margin: [10, 10, 10, 10],
        filename: `Dziennik_${driver.replace(/ /g,'_')}_${new Date().toISOString().slice(0,10)}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    try {
        await html2pdf().set(opt).from(element).save();
    } catch (err) {
        alert("Błąd podczas generowania PDF: " + err.message);
        console.error(err);
    }
}

// Reszta funkcji (addEntry, deleteEntry, editEntry, clearLog, saveHeader itd.)
function addEntry() {
    const type = document.getElementById('type').value;
    const date = document.getElementById('date').value || todayStr();
    const place = document.getElementById('place').value.trim();
    const odo = document.getElementById('odometer').value.trim();

    if (!place || !odo) { alert('Wpisz miejsce i stan licznika!'); return; }

    const entry = {
        id: entries.length ? Math.max(...entries.map(e => e.id)) + 1 : 1,
        date, type, place, odometer: odo, ts: Date.now()
    };
    entries.push(entry);
    persist();
    render();
    clearForm();
}

function deleteEntry(id) {
    if (confirm('Usunąć wpis?')) {
        entries = entries.filter(e => e.id !== id);
        persist();
        render();
    }
}

function editEntry(id) { /* dodaj własną logikę edycji jeśli chcesz */ }

function clearLog() {
    if (!confirm('🗑️ Na pewno wyczyścić WSZYSTKO?')) return;
    localStorage.clear();
    entries = [];
    document.getElementById('driver').value = '';
    document.getElementById('carNo').value = '';
    clearForm();
    render();
    alert('✅ Dane usunięte!');
}

function clearForm() {
    document.getElementById('place').value = '';
    document.getElementById('odometer').value = '';
    document.getElementById('date').value = todayStr();
}

function saveHeader() {
    localStorage.setItem('driverName', document.getElementById('driver').value);
    localStorage.setItem('carNumber', document.getElementById('carNo').value);
}

// ==================== START ====================
window.onload = () => {
    entries = load();
    document.getElementById('date').value = todayStr();
    document.getElementById('driver').value = localStorage.getItem('driverName') || '';
    document.getElementById('carNo').value = localStorage.getItem('carNumber') || '';
    render();
};
</script>
</body>
</html>
